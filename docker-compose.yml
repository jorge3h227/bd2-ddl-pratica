services:

  mysql:
    image: mysql:8.4
    container_name: mysql_bd2
    restart: always
    environment:
      MYSQL_ROOT_PASSWORD: root
      MYSQL_DATABASE: universidade
      MYSQL_USER: dev
      MYSQL_PASSWORD: minhasenha
    ports:
      - "3306:3306"
    volumes:
      - ./init-db:/docker-entrypoint-initdb.d